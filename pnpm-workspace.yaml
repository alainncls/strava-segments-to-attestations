packages:
  - 'packages/*'
minimumReleaseAge: 4320
allowBuilds:
  '@parcel/watcher': true
  '@reown/appkit': true
  bufferutil: true
  esbuild: true
  netlify-cli: true
  sharp: true
  unix-dgram: true
  utf-8-validate: true

catalog:
  # OpenZeppelin (must match verax-contracts requirements)
  '@openzeppelin/contracts': 4.9.6
  '@reown/appkit': ^1.8.19
  '@reown/appkit-adapter-wagmi': ^1.8.19

  # Wagmi & Viem
  '@tanstack/react-query': ^5.100.9

  # Testing
  '@testing-library/jest-dom': ^6.9.1
  '@testing-library/react': ^16.3.2

  # Types
  '@types/node': ^24.12.2
  '@types/react': ^19.2.14
  '@types/react-dom': ^19.2.3

  # Verax
  '@verax-attestation-registry/verax-contracts': ^10.0.0
  '@verax-attestation-registry/verax-sdk': ^5.4.0
  '@vitejs/plugin-react': ^4.7.0
  '@vitest/coverage-v8': ^3.2.4
  '@wagmi/connectors': ^8.0.7

  # Netlify
  dotenv-cli: ^11.0.0

  # Linting & Formatting
  eslint: ^10.3.0
  eslint-config-prettier: ^10.1.8
  globals: ^17.6.0

  # Solidity
  hardhat: ^3.4.4
  netlify-cli: ^26.0.1
  prettier: ^3.8.3

  # React
  react: ^19.2.5
  react-dom: ^19.2.5
  react-router-dom: ^7.15.0

  # TypeScript
  typescript: ^6.0.3
  typescript-eslint: ^8.59.2
  viem: ^2.48.8
  vite: ^7.3.2
  vitest: ^3.2.4
  wagmi: ^3.6.7
overrides:
  '@types/node': ^24.12.2
  # GHSA-w5hq-g745-h8pq: Netlify toolchain accepts the patched uuid 11.x release.
  '@netlify/build>uuid': 11.1.1
  '@netlify/edge-bundler>uuid': 11.1.1
  # GHSA-w5hq-g745-h8pq: Netlify CLI and dev-utils accept the patched uuid 13.x release.
  'netlify-cli>uuid': 13.0.1
  '@netlify/dev-utils>uuid': 13.0.1
